version = 1

test_patterns = ["backend/app/tests/*"]

exclude_patterns = ["backend/.venv"]

[[analyzers]]
name = "terraform"
enabled = true

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.x.x"
  type_checker = "mypy"

  [[analyzers.python.denylist]]
  pattern = "backend/app/tests/*"
  ignore_codes = ["PYL-W0404"]
  reason = "Allow import errors in tests"
