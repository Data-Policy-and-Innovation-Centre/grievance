version = 1

test_patterns = ["backend/app/tests/*"]

exclude_patterns = ["backend/.venv"]

[[analyzers]]
name = "terraform"
enabled = true

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.x.x"
  type_checker = "mypy"

  [analyzers.meta.ignore_patterns]
  "backend/app/tests/*" = [
    "PYL-W0404",  # Allow import errors in tests
    "PY-W0069",   # Commented out code is for future TODOs
    "PYL-W0603"   # Global variables sometimes necessary
  ]
