name: CI Unit Tests

on:
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker build -f backend/Dockerfile.test -t grievance-app-test backend

      - name: Run tests
        run: docker run --rm grievance-app-test 