name: Linting and Formatting

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
        contents: write
        pull-requests: write
        issues: write
        actions: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
    
    - name: Run ruff
      working-directory: ./backend
      run: | 
       uvx ruff check app/ --fix
       uvx ruff format app/
      
    - name: Auto-commit changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: lint and format code with ruff"
        file_pattern: "backend/"
    
    
    
    
    
