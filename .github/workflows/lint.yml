name: Code Quality

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
        contents: write
        pull-requests: write
        issues: write
        actions: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
    
    - name: Set up Python
      run: uv python install 3.11
    
    - name: Install dependencies
      working-directory: ./backend
      run: | 
       uv sync --dev
       uv add --dev mypy black isort flake8
    
    - name: Run Black
      working-directory: ./backend
      run: uv run black ./app
    
    - name: Run isort
      working-directory: ./backend
      run: uv run isort ./app
      
    - name: Auto-commit changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-format code with Black and isort"
        file_pattern: "backend/"
    
    - name: Run mypy
      id: mypy
      working-directory: ./backend
      run: |
          echo "## MyPy Type Checking" >> $GITHUB_STEP_SUMMARY
          if uv run mypy --ignore-missing-imports ./app > mypy_output.txt 2>&1; then
            echo "✅ MyPy type checking passed" >> $GITHUB_STEP_SUMMARY
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "❌ MyPy type checking failed" >> $GITHUB_STEP_SUMMARY
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "output<<EOF" >> $GITHUB_OUTPUT
            cat mypy_output.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      continue-on-error: true
    
    - name: Run flake8
      id: flake8
      working-directory: ./backend
      run: |
        echo "## Flake8 Linting Check" >> $GITHUB_STEP_SUMMARY
        if uv run flake8 ./app > flake8_output.txt 2>&1; then
          echo "✅ Flake8 linting passed" >> $GITHUB_STEP_SUMMARY
          echo "status=passed" >> $GITHUB_OUTPUT
        else
          echo "❌ Flake8 linting failed" >> $GITHUB_STEP_SUMMARY
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat flake8_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true

    - name: Create comment body
      id: comment_body
      run: |
        {
          echo "## 🔍 Code Quality Report"
          echo ""
          echo "| Tool | Status | Issues |"
          echo "|------|--------|--------|"
          
          
          # Flake8 status
          if [ "${{ steps.flake8.outputs.status }}" = "passed" ]; then
            echo "| Flake8 | ✅ Passed | None |"
          else
            echo "| Flake8 | ❌ Failed | Linting issues found |"
          fi
          
          # MyPy status
          if [ "${{ steps.mypy.outputs.status }}" = "passed" ]; then
            echo "| MyPy | ✅ Passed | None |"
          else
            echo "| MyPy | ❌ Failed | Type checking issues found |"
          fi
          
          echo ""
          
          
          if [ "${{ steps.flake8.outputs.status }}" = "failed" ]; then
            echo "### 🔧 Flake8 Linting Issues"
            echo ""
            echo "```"
            echo "${{ steps.flake8.outputs.output }}"
            echo "```"
            echo ""
          fi
          
          if [ "${{ steps.mypy.outputs.status }}" = "failed" ]; then
            echo "### 🏷️ MyPy Type Checking Issues"
            echo ""
            echo "```"
            echo "${{ steps.mypy.outputs.output }}"
            echo "```"
            echo ""
          fi
          
          # Add helpful instructions if any checks failed
          if [ "${{ steps.flake8.outputs.status }}" = "failed" ] || [ "${{ steps.mypy.outputs.status }}" = "failed" ]; then
            echo "### 🚀 How to Fix"
            echo ""
            echo "Run the following commands in your backend directory:"
            echo ""
            echo "```bash"
            echo "cd backend"
            if [ "${{ steps.flake8.outputs.status }}" = "failed" ]; then
              echo "# Fix flake8 issues manually based on the output above"
            fi
            if [ "${{ steps.mypy.outputs.status }}" = "failed" ]; then
              echo "# Fix mypy issues manually based on the output above"
            fi
            echo "```"
          fi
        } > comment_body.txt
        
        echo "comment_body<<EOF" >> $GITHUB_OUTPUT
        cat comment_body.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
          script: |
            // Delete previous bot comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body.includes('🔍 Code Quality Report')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
            
            // Post new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${{ steps.comment_body.outputs.comment_body }}`
            });
      
    - name: Set overall status
      run: |
          if [ "${{ steps.flake8.outputs.status }}" = "failed" ] || [ "${{ steps.mypy.outputs.status }}" = "failed" ]; then
            echo "One or more linting checks failed"
            exit 1
          else
            echo "All linting checks passed!"
          fi
    
    
    
