name: grievance-backend
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - loguru
  - requests
  - sqlalchemy
  - pip:
      - fastapi
      - uvicorn[standard]
      - httpx              # For making async HTTP calls (e.g., ingestion)
      - pydantic           # FastAPI already uses it, but useful explicitly too
      - pydantic_settings
      - pytest             # For unit testing
      - pytest-asyncio     # For testing async code
      - black              # Code formatter
      - isort              # Import sorter
      - flake8             # Linter